<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Премиери</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="container topbar">
    <a href="index.html" class="logo">
      <img src="Blue White Business ID Card.png" alt="Palace Кино" />
    </a>

    <div class="nav-wrap">
      <input type="checkbox" id="menu-toggle" class="menu-checkbox" />
      <label for="menu-toggle" class="menu-toggle" aria-label="Отвори меню">☰</label>

      <nav>
        <a href="index.html">Начало / Програма</a>
        <a href="premieres.html">Премиери в България</a>
        <a href="admin.html">Админ</a>
      </nav>
    </div>
  </div>
</header>

<main class="container">
  <section class="hero">
    <h1>Премиери в България</h1>
  </section>

  <div id="premieres-container" class="premiere-list">
    Зареждане...
  </div>
</main>

<footer>
  <div class="container">
    Официалният сайт на кино Palace:
    <a href="https://kinopalace.bg/" target="_blank" rel="noopener noreferrer">НАЧАЛО</a>
  </div>
</footer>

<script>
const API_BASE = "https://kinopalace-api.kristiyanmarkov44.workers.dev";
let premieresData = null;

loadPremieres();

async function loadPremieres() {
  try {
    const res = await fetch(`${API_BASE}/api/export-premieres`);

    if (!res.ok) throw new Error("Грешка при зареждане");

    const data = await res.json();
    premieresData = data;
    renderPremieres();
  } catch (e) {
    document.getElementById("premieres-container").innerHTML = `
      <div style="padding:28px;border-radius:20px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);text-align:center;">
        <h2 style="margin:0 0 12px;color:#fff;">В момента се прави подобрение по страницата</h2>
        <p style="margin:0;color:#cbd5e1;font-size:18px;line-height:1.6;">
          Надяваме се възможно най-скоро да възстановим достъпа до премиерите.
        </p>
      </div>
    `;
  }
}

function parseDate(dateStr) {
  const [day, month] = dateStr.split(".");
  const year = new Date().getFullYear();
  return new Date(year, Number(month) - 1, Number(day));
}

function isFuture(dateStr) {
  const today = new Date();
  today.setHours(0,0,0,0);

  const d = parseDate(dateStr);
  d.setHours(0,0,0,0);

  return d >= today;
}

function renderPremieres() {
  const container = document.getElementById("premieres-container");

  const movies = (premieresData.premieres || [])
    .filter(m => isFuture(m.date))
    .sort((a,b) => parseDate(a.date) - parseDate(b.date));

  if (movies.length === 0) {
    container.innerHTML = '<p style="color:#fde68a;">Няма предстоящи премиери.</p>';
    return;
  }

  container.innerHTML = "";

  movies.forEach(movie => {
    const el = document.createElement("div");
    el.className = "premiere";

    el.innerHTML = `
      <img src="${movie.poster}" alt="${movie.title}">
      <div class="premiere-body">
        <h3>${movie.title}</h3>

        <div class="date">Премиера: ${movie.date}</div>

        <div class="meta">
          <div><strong>Времетраене:</strong> ${movie.duration || "Няма информация"}</div>
          <div><strong>Жанр:</strong> ${movie.genre || "Няма информация"}</div>
          <div><strong>Версия:</strong> ${movie.version || "Няма информация"}</div>
        </div>

        <p>${movie.description || ""}</p>
      </div>
    `;

    container.appendChild(el);
  });
}

setInterval(loadPremieres, 60000);
</script>

</body>
</html>
