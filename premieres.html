<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Премиери</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="container topbar">
    <a href="index.html" class="logo">
      <img src="Blue White Business ID Card.png" alt="Palace Кино" />
    </a>

    <div class="nav-wrap">
      <input type="checkbox" id="menu-toggle" class="menu-checkbox" />
      <label for="menu-toggle" class="menu-toggle" aria-label="Отвори меню">☰</label>

      <nav>
        <a href="index.html">Начало / Програма</a>
        <a href="premieres.html">Премиери в България</a>
      </nav>
    </div>
  </div>
</header>

<main class="container">
  <section class="hero">
    <h1>Премиери в България</h1>
  </section>

  <div id="premieres-container" class="premiere-list">
    Зареждане...
  </div>
</main>

<footer>
  <div class="container">
    Официалният сайт на кино Palace:
    <a href="https://kinopalace.bg/" target="_blank" rel="noopener noreferrer">НАЧАЛО</a>
  </div>
</footer>

<script>
let premieresData = null;

fetch('premieres.json')
  .then(res => {
    if (!res.ok) throw new Error('Грешка при зареждане');
    return res.json();
  })
  .then(data => {
    premieresData = data;
    renderPremieres();
  })
  .catch(error => {
    console.error(error);
    document.getElementById('premieres-container').innerHTML =
      '<p style="color:#fca5a5;font-weight:700;">Грешка при зареждане на premieres.json</p>';
  });

function parseDate(dateStr) {
  const [day, month] = String(dateStr).split('.');
  const year = new Date().getFullYear();
  return new Date(year, Number(month) - 1, Number(day), 0, 0, 0, 0);
}

function isFuture(dateStr) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const d = parseDate(dateStr);
  d.setHours(0, 0, 0, 0);

  return d > today;
}

function renderPremieres() {
  const container = document.getElementById('premieres-container');

  if (!premieresData || !Array.isArray(premieresData.premieres)) {
    container.innerHTML = '<p style="color:#fca5a5;font-weight:700;">Невалиден формат на premieres.json</p>';
    return;
  }

  const movies = premieresData.premieres
    .filter(movie => movie && movie.date && isFuture(movie.date))
    .sort((a, b) => parseDate(a.date) - parseDate(b.date));

  if (movies.length === 0) {
    container.innerHTML = '<p style="color:#fde68a;font-weight:700;">Няма предстоящи премиери.</p>';
    return;
  }

  container.innerHTML = '';

  movies.forEach(movie => {
    const el = document.createElement('div');
    el.className = 'premiere';

    el.innerHTML = `
      <img src="${movie.poster || ''}" alt="${movie.title || 'Премиера'}">
      <div class="premiere-body">
        <h3>${movie.title || 'Без заглавие'}</h3>

        <div class="date">Премиера: ${movie.date}</div>

        <div class="meta">
          <div><strong>Времетраене:</strong> ${movie.duration || 'Няма информация'}</div>
          <div><strong>Категория:</strong> ${movie.category || 'Няма информация'}</div>
        </div>

        <p>${movie.description || ''}</p>

        ${
          movie.trailer
            ? `<button class="trailer-btn" onclick="openTrailer('${movie.trailer}')">▶ Трейлър</button>`
            : ''
        }
      </div>
    `;

    container.appendChild(el);
  });
}

function openTrailer(url) {
  window.open(url, '_blank', 'noopener,noreferrer');
}
</script>

</body>
</html>
