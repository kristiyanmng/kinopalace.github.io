<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ панел</title>
  <style>
    :root{
      --bg:#0b1020;
      --bg2:#151d33;
      --card:#111827;
      --line:rgba(255,255,255,.08);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --accent:#f59e0b;
      --danger:#ef4444;
      --info:#38bdf8;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:linear-gradient(180deg, var(--bg), var(--bg2));
    }

    .container{
      width:min(1240px,92%);
      margin:0 auto;
      padding:24px 0 60px;
    }

    h1,h2{margin:0 0 16px}
    h1{font-size:38px}
    h2{font-size:24px}

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      padding:18px 0;
      border-bottom:1px solid var(--line);
      margin-bottom:28px;
      flex-wrap:wrap;
    }

    .topbar a{
      color:var(--text);
      text-decoration:none;
      font-weight:700;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
      gap:20px;
    }

    .card{
      background:rgba(17,24,39,.95);
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
      box-shadow:0 16px 40px rgba(0,0,0,.28);
    }

    label{
      display:block;
      font-weight:700;
      margin:12px 0 6px;
    }

    input, textarea, select{
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);
      color:var(--text);
      font-size:15px;
    }

    textarea{
      min-height:100px;
      resize:vertical;
    }

    button{
      border:none;
      border-radius:12px;
      padding:12px 16px;
      font-weight:700;
      cursor:pointer;
      font-size:15px;
    }

    .btn{
      background:linear-gradient(135deg, #f97316, #f59e0b);
      color:#fff;
      width:100%;
      margin-top:16px;
    }

    .btn-secondary{
      background:#334155;
      color:#fff;
      width:100%;
      margin-top:10px;
    }

    .btn-danger{
      background:var(--danger);
      color:#fff;
      padding:8px 12px;
    }

    .btn-edit{
      background:var(--info);
      color:#001018;
      padding:8px 12px;
      font-weight:800;
    }

    .actions-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .list{
      display:grid;
      gap:12px;
      margin-top:14px;
    }

    .item{
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      padding:12px;
      background:rgba(255,255,255,.03);
    }

    .muted{
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
      word-break:break-word;
    }

    .status{
      margin:0 0 20px;
      padding:12px 14px;
      border-radius:12px;
      font-weight:700;
      display:none;
    }

    .status.show{display:block}
    .status.ok{
      background:rgba(34,197,94,.12);
      border:1px solid rgba(34,197,94,.24);
      color:#86efac;
    }
    .status.error{
      background:rgba(239,68,68,.12);
      border:1px solid rgba(239,68,68,.24);
      color:#fca5a5;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .edit-badge{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(56,189,248,.16);
      color:#7dd3fc;
      font-size:13px;
      font-weight:700;
      margin-bottom:8px;
    }

    @media (max-width:700px){
      .row{grid-template-columns:1fr}
      h1{font-size:28px}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a href="index.html">← Обратно към сайта</a>
      <a href="premieres.html">Премиери</a>
    </div>

    <h1>Админ панел</h1>
    <div id="status" class="status"></div>

    <div class="grid">
      <div class="card">
        <h2>Филм</h2>
        <div id="movie-mode-badge" class="edit-badge" style="display:none;">Режим: редакция</div>

        <input id="movie-id" type="hidden" />

        <label>Заглавие</label>
        <input id="movie-title" type="text" />

        <label>Описание</label>
        <textarea id="movie-description"></textarea>

        <label>Постер URL</label>
        <input id="movie-image" type="text" />

        <div class="row">
          <div>
            <label>Жанр</label>
            <input id="movie-genre" type="text" />
          </div>
          <div>
            <label>Продължителност (в минути)</label>
            <input id="movie-duration" type="number" />
          </div>
        </div>

        <label>Версия</label>
        <input id="movie-version" type="text" placeholder="2D / дублиран" />

        <label>Трейлър URL</label>
        <input id="movie-trailer" type="text" placeholder="https://www.youtube.com/embed/..." />

        <label>Категория</label>
        <input id="movie-category" type="text" placeholder="B - Без възрастови ограничения" />

        <button class="btn" onclick="saveMovie()">Запази филм</button>
        <button class="btn-secondary" onclick="resetMovieForm()">Изчисти форма</button>
      </div>

      <div class="card">
        <h2>Прожекция</h2>
        <div id="showtime-mode-badge" class="edit-badge" style="display:none;">Режим: редакция</div>

        <input id="showtime-id" type="hidden" />

        <label>Филм</label>
        <select id="showtime-movie"></select>

        <div class="row">
          <div>
            <label>Дата</label>
            <input id="showtime-date" type="text" placeholder="01.04" />
          </div>
          <div>
            <label>Час</label>
            <input id="showtime-time" type="text" placeholder="19:30" />
          </div>
        </div>

        <label>Зала</label>
        <input id="showtime-hall" type="text" value="Зала 1" />

        <div class="row">
          <div>
            <label>3D</label>
            <select id="showtime-is3d">
              <option value="0">Не</option>
              <option value="1">Да</option>
            </select>
          </div>
          <div>
            <label>Дублиран</label>
            <select id="showtime-isdubbed">
              <option value="0">Не</option>
              <option value="1">Да</option>
            </select>
          </div>
        </div>

        <button class="btn" onclick="saveShowtime()">Запази прожекция</button>
        <button class="btn-secondary" onclick="resetShowtimeForm()">Изчисти форма</button>
      </div>

      <div class="card">
        <h2>Премиера</h2>
        <div id="premiere-mode-badge" class="edit-badge" style="display:none;">Режим: редакция</div>

        <input id="premiere-id" type="hidden" />

        <label>Филм</label>
        <select id="premiere-movie"></select>

        <label>Дата на премиера</label>
        <input id="premiere-date" type="text" placeholder="29.04" />

        <button class="btn" onclick="savePremiere()">Запази премиера</button>
        <button class="btn-secondary" onclick="resetPremiereForm()">Изчисти форма</button>
      </div>

      <div class="card">
        <h2>Филми</h2>
        <div id="movies-list" class="list"></div>
      </div>

      <div class="card">
        <h2>Прожекции</h2>
        <div id="showtimes-list" class="list"></div>
      </div>

      <div class="card">
        <h2>Премиери</h2>
        <div id="premieres-list" class="list"></div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://kinopalace-api.kristiyanmarkov44.workers.dev";

    let moviesCache = [];
    let showtimesCache = [];
    let premieresCache = [];

    function showStatus(message, type = "ok") {
      const el = document.getElementById("status");
      el.className = `status show ${type}`;
      el.textContent = message;
      setTimeout(() => {
        el.className = "status";
        el.textContent = "";
      }, 4000);
    }

    async function api(path, options = {}) {
      const res = await fetch(API_BASE + path, {
        headers: { "Content-Type": "application/json" },
        ...options
      });

      const contentType = res.headers.get("content-type") || "";
      const data = contentType.includes("application/json")
        ? await res.json()
        : await res.text();

      if (!res.ok) {
        throw new Error(data?.error || data?.details || data || "Грешка");
      }

      return data;
    }

    function resetMovieForm() {
      document.getElementById("movie-id").value = "";
      document.getElementById("movie-title").value = "";
      document.getElementById("movie-description").value = "";
      document.getElementById("movie-image").value = "";
      document.getElementById("movie-genre").value = "";
      document.getElementById("movie-duration").value = "";
      document.getElementById("movie-version").value = "";
      document.getElementById("movie-trailer").value = "";
      document.getElementById("movie-category").value = "";
      document.getElementById("movie-mode-badge").style.display = "none";
    }

    function resetShowtimeForm() {
      document.getElementById("showtime-id").value = "";
      document.getElementById("showtime-date").value = "";
      document.getElementById("showtime-time").value = "";
      document.getElementById("showtime-hall").value = "Зала 1";
      document.getElementById("showtime-is3d").value = "0";
      document.getElementById("showtime-isdubbed").value = "0";
      document.getElementById("showtime-mode-badge").style.display = "none";
    }

    function resetPremiereForm() {
      document.getElementById("premiere-id").value = "";
      document.getElementById("premiere-date").value = "";
      document.getElementById("premiere-mode-badge").style.display = "none";
    }

    function fillMovieForm(movie) {
      document.getElementById("movie-id").value = movie.id;
      document.getElementById("movie-title").value = movie.title || "";
      document.getElementById("movie-description").value = movie.description || "";
      document.getElementById("movie-image").value = movie.image || "";
      document.getElementById("movie-genre").value = movie.genre || "";
      document.getElementById("movie-duration").value = movie.duration || "";
      document.getElementById("movie-version").value = movie.version || "";
      document.getElementById("movie-trailer").value = movie.trailer || "";
      document.getElementById("movie-category").value = movie.category || "";
      document.getElementById("movie-mode-badge").style.display = "inline-block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function fillShowtimeForm(item) {
      document.getElementById("showtime-id").value = item.id;
      document.getElementById("showtime-movie").value = item.movie_id;
      document.getElementById("showtime-date").value = item.date || "";
      document.getElementById("showtime-time").value = item.time || "";
      document.getElementById("showtime-hall").value = item.hall || "Зала 1";
      document.getElementById("showtime-is3d").value = item.is_3d ? "1" : "0";
      document.getElementById("showtime-isdubbed").value = item.is_dubbed ? "1" : "0";
      document.getElementById("showtime-mode-badge").style.display = "inline-block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function fillPremiereForm(item) {
      document.getElementById("premiere-id").value = item.id;
      document.getElementById("premiere-movie").value = item.movie_id;
      document.getElementById("premiere-date").value = item.premiere_date || "";
      document.getElementById("premiere-mode-badge").style.display = "inline-block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function loadMovies() {
      const movies = await api("/api/movies");
      moviesCache = movies;

      const movieSelect = document.getElementById("showtime-movie");
      const premiereSelect = document.getElementById("premiere-movie");
      const moviesList = document.getElementById("movies-list");

      movieSelect.innerHTML = "";
      premiereSelect.innerHTML = "";
      moviesList.innerHTML = "";

      movies.forEach(movie => {
        const option1 = document.createElement("option");
        option1.value = movie.id;
        option1.textContent = `${movie.id} - ${movie.title}`;
        movieSelect.appendChild(option1);

        const option2 = document.createElement("option");
        option2.value = movie.id;
        option2.textContent = `${movie.id} - ${movie.title}`;
        premiereSelect.appendChild(option2);

        const item = document.createElement("div");
        item.className = "item";
        item.innerHTML = `
          <strong>${movie.title}</strong>
          <div class="muted">
            ID: ${movie.id}<br>
            Жанр: ${movie.genre || "-"}<br>
            Версия: ${movie.version || "-"}<br>
            Продължителност: ${movie.duration || 0} мин<br>
            Категория: ${movie.category || "-"}<br>
            Трейлър: ${movie.trailer || "-"}
          </div>
          <div class="actions-row">
            <button class="btn-edit" onclick="editMovie(${movie.id})">Редактирай</button>
            <button class="btn-danger" onclick="deleteMovie(${movie.id})">Изтрий</button>
          </div>
        `;
        moviesList.appendChild(item);
      });
    }

    async function loadShowtimes() {
      const showtimes = await api("/api/showtimes");
      showtimesCache = showtimes;

      const list = document.getElementById("showtimes-list");
      list.innerHTML = "";

      showtimes.forEach(item => {
        const el = document.createElement("div");
        el.className = "item";
        el.innerHTML = `
          <strong>${item.title || "Без име"}</strong>
          <div class="muted">
            ID: ${item.id}<br>
            ${item.date} • ${item.time}<br>
            ${item.hall || "Зала 1"}<br>
            3D: ${item.is_3d ? "Да" : "Не"}<br>
            Дублиран: ${item.is_dubbed ? "Да" : "Не"}
          </div>
          <div class="actions-row">
            <button class="btn-edit" onclick="editShowtime(${item.id})">Редактирай</button>
            <button class="btn-danger" onclick="deleteShowtime(${item.id})">Изтрий</button>
          </div>
        `;
        list.appendChild(el);
      });
    }

    async function loadPremieres() {
      const premieres = await api("/api/premieres");
      premieresCache = premieres;

      const list = document.getElementById("premieres-list");
      list.innerHTML = "";

      premieres.forEach(item => {
        const el = document.createElement("div");
        el.className = "item";
        el.innerHTML = `
          <strong>${item.title || "Без име"}</strong>
          <div class="muted">
            ID: ${item.id}<br>
            Премиера: ${item.premiere_date}
          </div>
          <div class="actions-row">
            <button class="btn-edit" onclick="editPremiere(${item.id})">Редактирай</button>
            <button class="btn-danger" onclick="deletePremiere(${item.id})">Изтрий</button>
          </div>
        `;
        list.appendChild(el);
      });
    }

    function editMovie(id) {
      const movie = moviesCache.find(m => Number(m.id) === Number(id));
      if (!movie) return;
      fillMovieForm(movie);
    }

    function editShowtime(id) {
      const item = showtimesCache.find(s => Number(s.id) === Number(id));
      if (!item) return;
      fillShowtimeForm(item);
    }

    function editPremiere(id) {
      const item = premieresCache.find(p => Number(p.id) === Number(id));
      if (!item) return;
      fillPremiereForm(item);
    }

    async function saveMovie() {
      try {
        const id = document.getElementById("movie-id").value.trim();

        const payload = {
          title: document.getElementById("movie-title").value.trim(),
          description: document.getElementById("movie-description").value.trim(),
          image: document.getElementById("movie-image").value.trim(),
          genre: document.getElementById("movie-genre").value.trim(),
          duration: Number(document.getElementById("movie-duration").value || 0),
          version: document.getElementById("movie-version").value.trim(),
          trailer: document.getElementById("movie-trailer").value.trim(),
          category: document.getElementById("movie-category").value.trim()
        };

        if (id) {
          await api("/api/update-movie", {
            method: "POST",
            body: JSON.stringify({
              id: Number(id),
              ...payload
            })
          });
          showStatus("Филмът е редактиран.");
        } else {
          await api("/api/add-movie", {
            method: "POST",
            body: JSON.stringify(payload)
          });
          showStatus("Филмът е добавен.");
        }

        resetMovieForm();
        await refreshAll();
      } catch (e) {
        showStatus(e.message, "error");
      }
    }

    async function saveShowtime() {
      try {
        const id = document.getElementById("showtime-id").value.trim();

        const payload = {
          movie_id: Number(document.getElementById("showtime-movie").value),
          date: document.getElementById("showtime-date").value.trim(),
          time: document.getElementById("showtime-time").value.trim(),
          hall: document.getElementById("showtime-hall").value.trim(),
          is_3d: Number(document.getElementById("showtime-is3d").value),
          is_dubbed: Number(document.getElementById("showtime-isdubbed").value)
        };

        if (id) {
          await api("/api/update-showtime", {
            method: "POST",
            body: JSON.stringify({
              id: Number(id),
              ...payload
            })
          });
          showStatus("Прожекцията е редактирана.");
        } else {
          await api("/api/add-showtime", {
            method: "POST",
            body: JSON.stringify(payload)
          });
          showStatus("Прожекцията е добавена.");
        }

        resetShowtimeForm();
        await refreshAll();
      } catch (e) {
        showStatus(e.message, "error");
      }
    }

    async function savePremiere() {
      try {
        const id = document.getElementById("premiere-id").value.trim();

        const payload = {
          movie_id: Number(document.getElementById("premiere-movie").value),
          premiere_date: document.getElementById("premiere-date").value.trim()
        };

        if (id) {
          await api("/api/update-premiere", {
            method: "POST",
            body: JSON.stringify({
              id: Number(id),
              ...payload
            })
          });
          showStatus("Премиерата е редактирана.");
        } else {
          await api("/api/add-premiere", {
            method: "POST",
            body: JSON.stringify(payload)
          });
          showStatus("Премиерата е добавена.");
        }

        resetPremiereForm();
        await refreshAll();
      } catch (e) {
        showStatus(e.message, "error");
      }
    }

    async function deleteMovie(id) {
      if (!confirm("Сигурен ли си?")) return;
      try {
        await api("/api/delete-movie", {
          method: "POST",
          body: JSON.stringify({ id })
        });
        showStatus("Филмът е изтрит.");
        resetMovieForm();
        await refreshAll();
      } catch (e) {
        showStatus(e.message, "error");
      }
    }

    async function deleteShowtime(id) {
      if (!confirm("Сигурен ли си?")) return;
      try {
        await api("/api/delete-showtime", {
          method: "POST",
          body: JSON.stringify({ id })
        });
        showStatus("Прожекцията е изтрита.");
        resetShowtimeForm();
        await refreshAll();
      } catch (e) {
        showStatus(e.message, "error");
      }
    }

    async function deletePremiere(id) {
      if (!confirm("Сигурен ли си?")) return;
      try {
        await api("/api/delete-premiere", {
          method: "POST",
          body: JSON.stringify({ id })
        });
        showStatus("Премиерата е изтрита.");
        resetPremiereForm();
        await refreshAll();
      } catch (e) {
        showStatus(e.message, "error");
      }
    }

    async function refreshAll() {
      await loadMovies();
      await loadShowtimes();
      await loadPremieres();
    }

    refreshAll();
  </script>
</body>
</html>
