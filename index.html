<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Кино Програма</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="container topbar">
      <a href="index.html" class="logo">
        <img src="Blue White Business ID Card.png" alt="Palace Кино" />
      </a>

      <div class="nav-wrap">
        <input type="checkbox" id="menu-toggle" class="menu-checkbox" />
        <label for="menu-toggle" class="menu-toggle" aria-label="Отвори меню">☰</label>

        <nav>
          <a href="index.html">Програма</a>
          <a href="premieres.html">Премиери в България</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1 id="week-title">Програма</h1>
    </section>

    <div class="days-nav">
      <button class="days-arrow" id="days-prev" aria-label="Предишни дни">‹</button>
      <section class="days-strip" id="days-strip"></section>
      <button class="days-arrow" id="days-next" aria-label="Следващи дни">›</button>
    </div>

    <section class="grid" id="movies-container">Зареждане...</section>
  </main>

  <footer>
    <div class="container">
      Официалният сайт на кино Palace:
      <a href="https://kinopalace.bg/" target="_blank" rel="noopener noreferrer">НАЧАЛО</a>
    </div>
  </footer>

  <div id="trailerModal" class="modal" onclick="outsideClose(event)">
    <div class="modal-content">
      <button class="close" onclick="closeTrailer()" aria-label="Затвори трейлъра">×</button>
      <iframe
        id="trailerFrame"
        src=""
        title="Трейлър"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <script>
    let scheduleData = null;
    let activeDayIndex = 0;
    let lastDate = new Date().getDate();
    const ADS_MINUTES = 10;

    fetch('schedule.json')
      .then(response => {
        if (!response.ok) {
          throw new Error('Не може да се зареди schedule.json');
        }
        return response.json();
      })
      .then(data => {
        scheduleData = data;
        document.getElementById('week-title').textContent = data.weekTitle;
        setTodayAsActive();
        renderDays();
        renderMovies();
        setupDaysNavigation();
      })
      .catch(error => {
        console.error(error);
        document.getElementById('movies-container').innerHTML =
          '<p style="color:#fca5a5;font-weight:700;">Грешка при зареждане на schedule.json</p>';
      });

    function parseDayDate(dayDate) {
      const [day, month] = dayDate.split('.');
      const today = new Date();
      const year = today.getFullYear();
      return new Date(year, Number(month) - 1, Number(day));
    }

    function isFutureOrToday(dayDate) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const dateObj = parseDayDate(dayDate);
      dateObj.setHours(0, 0, 0, 0);

      return dateObj >= today;
    }

    function getVisibleDays() {
      return scheduleData.days.filter(day => isFutureOrToday(day.date));
    }

    function setTodayAsActive() {
      const today = new Date();
      const todayStr =
        String(today.getDate()).padStart(2, '0') + '.' +
        String(today.getMonth() + 1).padStart(2, '0');

      const visibleDays = getVisibleDays();
      const todayIndex = visibleDays.findIndex(day => day.date === todayStr);

      if (todayIndex !== -1) {
        activeDayIndex = todayIndex;
        return;
      }

      const firstDayWithMovies = visibleDays.findIndex(day => day.movies && day.movies.length > 0);
      activeDayIndex = firstDayWithMovies !== -1 ? firstDayWithMovies : 0;
    }

    function renderDays() {
      const strip = document.getElementById('days-strip');
      const visibleDays = getVisibleDays();

      strip.innerHTML = '';

      const shortDays = {
        'Понеделник': 'Пон',
        'Вторник': 'Вт',
        'Сряда': 'Ср',
        'Четвъртък': 'Чет',
        'Петък': 'Пет',
        'Събота': 'Съб',
        'Неделя': 'Нед'
      };

      visibleDays.forEach((day, index) => {
        const hasMovies = day.movies && day.movies.length > 0;
        const mobileLabel = window.innerWidth <= 760
          ? (shortDays[day.label] || day.label)
          : day.label;

        const btn = document.createElement('button');
        btn.className =
          'day-tab' +
          (index === activeDayIndex ? ' active' : '') +
          (!hasMovies ? ' empty-day' : '');

        btn.innerHTML = `
          <span class="day-label">${mobileLabel}</span>
          <span class="day-date">${day.date}</span>
          `;

        if (!hasMovies) {
          btn.disabled = true;
        } else {
          btn.addEventListener('click', () => {
            activeDayIndex = index;
            renderDays();
            renderMovies();
          });
        }

        strip.appendChild(btn);
      });

      updateDaysArrows();
    }

    function updateDaysArrows() {
      const strip = document.getElementById('days-strip');
      const prev = document.getElementById('days-prev');
      const next = document.getElementById('days-next');

      if (!strip || !prev || !next) return;

      prev.disabled = strip.scrollLeft <= 0;
      next.disabled = strip.scrollLeft + strip.clientWidth >= strip.scrollWidth - 2;
    }

    function setupDaysNavigation() {
      const strip = document.getElementById('days-strip');
      const prev = document.getElementById('days-prev');
      const next = document.getElementById('days-next');

      if (!strip || !prev || !next) return;

      prev.addEventListener('click', () => {
        strip.scrollBy({ left: -320, behavior: 'smooth' });
      });

      next.addEventListener('click', () => {
        strip.scrollBy({ left: 320, behavior: 'smooth' });
      });

      strip.addEventListener('scroll', updateDaysArrows);
      window.addEventListener('resize', () => {
        renderDays();
        updateDaysArrows();
      });

      updateDaysArrows();
    }

    function parseTimeToDate(dayDate, timeString) {
      const [day, month] = dayDate.split('.');
      const [hours, minutes] = timeString.split(':');
      const now = new Date();
      const year = now.getFullYear();

      return new Date(
        year,
        Number(month) - 1,
        Number(day),
        Number(hours),
        Number(minutes),
        0,
        0
      );
    }

    function parseDurationMinutes(durationText) {
      const match = durationText.match(/\d+/);
      return match ? Number(match[0]) : 0;
    }

    function isTimeStillVisible(dayDate, timeString) {
      const screeningTime = parseTimeToDate(dayDate, timeString);
      const hideAfter = new Date(screeningTime.getTime() + 10 * 60 * 1000);
      const now = new Date();

      return now <= hideAfter;
    }

    function getScreeningProgress(dayDate, timeString, durationText) {
      const startTime = parseTimeToDate(dayDate, timeString);
      const filmMinutes = parseDurationMinutes(durationText);
      const totalMinutes = ADS_MINUTES + filmMinutes;

      const adsEndTime = new Date(startTime.getTime() + ADS_MINUTES * 60 * 1000);
      const endTime = new Date(startTime.getTime() + totalMinutes * 60 * 1000);

      const now = new Date();
      const total = endTime - startTime;
      const elapsed = now - startTime;
      const remaining = endTime - now;

      if (now < startTime || now > endTime || total <= 0) {
        return null;
      }

      const percent = Math.min(100, Math.max(0, (elapsed / total) * 100));
      const remainingMinutes = Math.max(0, Math.ceil(remaining / 60000));

      let phase = 'movie';
      let phaseLabel = 'В прожекция';

      if (now < adsEndTime) {
        phase = 'ads';
        phaseLabel = 'Реклами';
      }

      return {
        percent,
        remainingMinutes,
        phase,
        phaseLabel
      };
    }

    function renderMovies() {
      const container = document.getElementById('movies-container');
      const visibleDays = getVisibleDays();
      const day = visibleDays[activeDayIndex];

      container.innerHTML = '';

      if (!day) {
        container.innerHTML = '<p style="color:#fde68a;font-weight:700;">Няма налична програма за показване.</p>';
        return;
      }

      const now = new Date();

      const preparedMovies = day.movies
        .map(movie => {
          const visibleTimes = movie.times
            .filter(time => isTimeStillVisible(day.date, time))
            .sort((a, b) => parseTimeToDate(day.date, a) - parseTimeToDate(day.date, b));

          const activeProgress = movie.times
            .map(time => ({
              time,
              progress: getScreeningProgress(day.date, time, movie.duration)
            }))
            .find(item => item.progress !== null);

          const upcomingTimes = movie.times
            .map(time => ({
              time,
              dateObj: parseTimeToDate(day.date, time)
            }))
            .filter(item => item.dateObj > now)
            .sort((a, b) => a.dateObj - b.dateObj);

          let sortTime = null;
          let nextCountdown = null;

          if (upcomingTimes.length > 0) {
            sortTime = upcomingTimes[0].dateObj;

            const diffMs = upcomingTimes[0].dateObj - now;
            const totalMinutes = Math.max(0, Math.floor(diffMs / 60000));
            const hours = Math.floor(totalMinutes / 60);
            const minutes = totalMinutes % 60;

            nextCountdown = {
              time: upcomingTimes[0].time,
              text: hours > 0 ? `${hours} ч ${minutes} мин` : `${minutes} мин`
            };
          } else if (activeProgress) {
            sortTime = new Date(now.getTime() + 365 * 24 * 60 * 60 * 1000);
          }

          if (visibleTimes.length === 0 && !activeProgress) {
            return null;
          }

          return {
            ...movie,
            visibleTimes,
            activeProgress,
            sortTime,
            nextCountdown
          };
        })
        .filter(Boolean)
        .sort((a, b) => a.sortTime - b.sortTime);

      if (preparedMovies.length === 0) {
        container.innerHTML = '<p style="color:#fde68a;font-weight:700;">Все още няма налични прожекции за този ден.</p>';
        return;
      }

      preparedMovies.forEach(movie => {
        const card = document.createElement('article');
        card.className = 'card';

        const timesHtml = movie.visibleTimes.length
          ? movie.visibleTimes.map(time => `<span class="time">${time}</span>`).join('')
          : '<span class="time" style="opacity:.6;">Прожекцията вече тече</span>';

        const progressHtml = movie.activeProgress
          ? `
            <div class="screening-progress ${movie.activeProgress.progress.phase === 'ads' ? 'ads-phase' : ''}">
              <div class="screening-progress-header">
                <span class="live-badge pulse">${movie.activeProgress.progress.phaseLabel}</span>
                <span class="remaining-time">Остават ${movie.activeProgress.progress.remainingMinutes} мин</span>
              </div>
              <div class="progress-bar">
                <div class="progress-bar-fill" style="width:${movie.activeProgress.progress.percent}%"></div>
              </div>
            </div>
          `
          : '';

        const countdownHtml = !movie.activeProgress && movie.nextCountdown
          ? `
            <div class="next-countdown">
              <div class="next-countdown-header">
                <span class="next-badge">Следваща прожекция</span>
                <span class="next-time">${movie.nextCountdown.time}</span>
              </div>
              <div class="next-countdown-text">Започва след ${movie.nextCountdown.text}</div>
            </div>
          `
          : '';

        const versionFormatted = movie.version
          .replace('3D', '<span class="tag-3d">3D</span>');

        card.innerHTML = `
          <img class="poster" src="${movie.poster}" alt="${movie.title}">
          <div class="card-body">
            <h3>${movie.title}</h3>

            <div class="meta">
              <div><strong>Жанр:</strong> ${movie.genre}</div>
              <div><strong>Продължителност:</strong> ${movie.duration}</div>
              <div><strong>Версия:</strong> ${versionFormatted}</div>
            </div>

            <div class="actions">
              <button class="trailer-btn" onclick="openTrailer('${movie.trailer}')">
                ▶ Трейлър
              </button>
            </div>

            <div class="times">
              <div class="schedule-group">
                <div class="schedule-hours">
                  ${timesHtml}
                </div>
              </div>
            </div>

            ${progressHtml}
            ${countdownHtml}

            <span class="badge">Категория: ${movie.category}</span>
          </div>
        `;

        container.appendChild(card);
      });
    }

    function openTrailer(url) {
      const modal = document.getElementById('trailerModal');
      const frame = document.getElementById('trailerFrame');
      frame.src = url + '?autoplay=1';
      modal.classList.add('active');
    }

    function closeTrailer() {
      const modal = document.getElementById('trailerModal');
      const frame = document.getElementById('trailerFrame');
      frame.src = '';
      modal.classList.remove('active');
    }

    function outsideClose(event) {
      const content = document.querySelector('.modal-content');
      if (!content.contains(event.target)) {
        closeTrailer();
      }
    }

    function refreshLiveUI() {
      if (!scheduleData) return;

      const now = new Date();

      if (now.getDate() !== lastDate) {
        lastDate = now.getDate();
        setTodayAsActive();
        renderDays();
      }

      renderMovies();
    }

    setInterval(() => {
      refreshLiveUI();
    }, 10000);

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        refreshLiveUI();
      }
    });

    window.addEventListener('focus', () => {
      refreshLiveUI();
    });
  </script>
</body>
</html>
