<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Кино Програма</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="container topbar">
      <a href="index.html" class="logo">
        <img src="Blue White Business ID Card.png" alt="Palace Кино" />
      </a>

      <div class="nav-wrap">
        <input type="checkbox" id="menu-toggle" class="menu-checkbox" />
        <label for="menu-toggle" class="menu-toggle" aria-label="Отвори меню">☰</label>

        <nav>
          <a href="index.html">Програма</a>
          <a href="premieres.html">Премиери в България</a>
          <a href="prices.html">Цени</a>
          <a href="#movies-container" id="live-nav-btn" class="live-nav-btn" style="display:none;">
            LIVE
          </a>
        </nav>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1 id="week-title">Програма</h1>
    </section>

    <section id="live-strip" class="live-strip hidden">
      <div class="live-strip-title">Активни прожекции</div>
      <div id="live-strip-list" class="live-strip-list"></div>
    </section>

    <div class="days-nav">
      <button class="days-arrow" id="days-prev" aria-label="Предишни дни">‹</button>
      <section class="days-strip" id="days-strip"></section>
      <button class="days-arrow" id="days-next" aria-label="Следващи дни">›</button>
    </div>

    <section class="grid" id="movies-container">Зареждане...</section>
  </main>

  <footer>
    <div class="container">
      Официалният сайт на кино Palace:
      <a href="https://kinopalace.bg/" target="_blank" rel="noopener noreferrer">НАЧАЛО</a>
    </div>
  </footer>

  <div id="trailerModal" class="modal" onclick="outsideClose(event)">
    <div class="modal-content">
      <button class="close" onclick="closeTrailer()" aria-label="Затвори трейлъра">×</button>
      <iframe
        id="trailerFrame"
        src=""
        title="Трейлър"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <script>
    const API_BASE = "https://kinopalace-api.kristiyanmarkov44.workers.dev";

    let scheduleData = null;
    let activeDayIndex = 0;
    let lastDate = null;
    let daysNavigationInitialized = false;
    let lastVersion = null;
    let isLoadingSchedule = false;

    let serverNowBase = null;
    let clientNowBase = null;
    let serverToday = null;
    let serverTimezone = "Europe/Sofia";

    loadSchedule(true);

    function getServerNow() {
      if (!serverNowBase || !clientNowBase) {
        return new Date();
      }

      const elapsed = Date.now() - clientNowBase;
      return new Date(serverNowBase.getTime() + elapsed);
    }

    function getServerTodayISO() {
      if (serverToday && /^\d{4}-\d{2}-\d{2}$/.test(serverToday)) {
        return serverToday;
      }

      const now = getServerNow();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    async function loadSchedule(initial = false) {
      if (isLoadingSchedule) return;
      isLoadingSchedule = true;

      try {
        const response = await fetch(`${API_BASE}/api/export-schedule`, { cache: "no-store" });

        if (!response.ok) {
          throw new Error("Не може да се зареди програмата от API");
        }

        const data = await response.json();

        if (data.server_now) {
          const parsedServerNow = new Date(data.server_now);
          if (!isNaN(parsedServerNow.getTime())) {
            serverNowBase = parsedServerNow;
            clientNowBase = Date.now();
          }
        }

        serverToday = data.server_today || null;
        serverTimezone = data.server_timezone || "Europe/Sofia";

        scheduleData = normalizeScheduleData(data);

        lastDate = getServerNow().getDate();

        document.getElementById("week-title").textContent =
          scheduleData.weekTitle || "Програма";

        setTodayAsActive();
        renderDays();
        renderMovies();
        renderLiveNavButton();
        renderLiveStrip();
        setupDaysNavigation();
        setupLiveNavClick();

        if (initial) {
          await primeVersion();
        }
      } catch (error) {
        console.error(error);
        document.getElementById("movies-container").innerHTML = `
          <div style="grid-column:1/-1;padding:28px;border-radius:20px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);text-align:center;">
            <h2 style="margin:0 0 12px;color:#fff;">В момента се прави подобрение по страницата</h2>
            <p style="margin:0;color:#cbd5e1;font-size:18px;line-height:1.6;">
              Надяваме се възможно най-скоро да възстановим достъпа до програмата.
            </p>
          </div>
        `;
      } finally {
        isLoadingSchedule = false;
      }
    }

    async function primeVersion() {
      try {
        const res = await fetch(`${API_BASE}/api/public-version`, { cache: "no-store" });
        if (!res.ok) return;
        const data = await res.json();
        lastVersion = data.version || "0";
      } catch (e) {
        console.error(e);
      }
    }

    async function checkVersion() {
      try {
        const res = await fetch(`${API_BASE}/api/public-version`, { cache: "no-store" });
        if (!res.ok) return;

        const data = await res.json();
        const currentVersion = data.version || "0";

        if (!lastVersion) {
          lastVersion = currentVersion;
          return;
        }

        if (currentVersion !== lastVersion) {
          lastVersion = currentVersion;
          await loadSchedule();
        }
      } catch (e) {
        console.error(e);
      }
    }

    function normalizeScheduleData(data) {
      return {
        ...data,
        days: (data.days || []).map(day => ({
          ...day,
          iso_date: day.iso_date || bgToISO(day.date),
          movies: (day.movies || []).map(movie => ({
            ...movie,
            times: normalizeMovieTimes(movie.times, day.iso_date || bgToISO(day.date))
          }))
        }))
      };
    }

    function normalizeMovieTimes(times, fallbackIsoDate) {
      if (!Array.isArray(times)) return [];

      return times.map(item => {
        if (typeof item === "string") {
          return {
            id: null,
            time: item,
            scheduled_time: item,
            hall: "Зала 1",
            type: "standard",
            status: "scheduled",
            iso_date: fallbackIsoDate || ""
          };
        }

        const hall = item.hall || "Зала 1";
        const status = item.status || "scheduled";

        return {
          id: item.id ?? null,
          time: item.time || item.scheduled_time || "",
          scheduled_time: item.scheduled_time || item.time || "",
          hall,
          type: item.type || (/vip/i.test(hall) ? "vip" : "standard"),
          status,
          iso_date: item.iso_date || fallbackIsoDate || "",
          is_3d: !!item.is_3d,
          is_dubbed: !!item.is_dubbed
        };
      }).filter(item => item.time);
    }

    function bgToISO(dayDate) {
      if (!dayDate) return "";
      if (/^\d{4}-\d{2}-\d{2}$/.test(dayDate)) return dayDate;

      const [day, month, yearMaybe] = String(dayDate).split(".");
      const year = yearMaybe || String(getServerNow().getFullYear());

      if (!day || !month) return "";
      return `${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    }

    function parseISODate(isoDate) {
      return new Date(`${isoDate}T00:00:00`);
    }

    function isFutureOrToday(isoDate) {
      const today = parseISODate(getServerTodayISO());
      today.setHours(0, 0, 0, 0);

      const dateObj = parseISODate(isoDate);
      dateObj.setHours(0, 0, 0, 0);

      return dateObj >= today;
    }

    function isTodayISO(isoDate) {
      return isoDate === getServerTodayISO();
    }

    function getVisibleDays() {
      return (scheduleData?.days || []).filter(day =>
        isFutureOrToday(day.iso_date) &&
        Array.isArray(day.movies) &&
        day.movies.some(movie => Array.isArray(movie.times) && movie.times.length > 0)
      );
    }

    function setTodayAsActive() {
      const visibleDays = getVisibleDays();
      const todayIndex = visibleDays.findIndex(day => isTodayISO(day.iso_date));

      if (todayIndex !== -1) {
        activeDayIndex = todayIndex;
        return;
      }

      const firstDayWithMovies = visibleDays.findIndex(day => day.movies && day.movies.length > 0);
      activeDayIndex = firstDayWithMovies !== -1 ? firstDayWithMovies : 0;
    }

    function renderDays() {
      const strip = document.getElementById("days-strip");
      const visibleDays = getVisibleDays();

      strip.innerHTML = "";

      const shortDays = {
        "Понеделник": "Пон",
        "Вторник": "Вт",
        "Сряда": "Ср",
        "Четвъртък": "Чет",
        "Петък": "Пет",
        "Събота": "Съб",
        "Неделя": "Нед"
      };

      visibleDays.forEach((day, index) => {
        const hasMovies = day.movies && day.movies.length > 0;
        const mobileLabel = window.innerWidth <= 760
          ? (shortDays[day.label] || day.label)
          : day.label;

        const btn = document.createElement("button");
        btn.className =
          "day-tab" +
          (index === activeDayIndex ? " active" : "") +
          (!hasMovies ? " empty-day" : "");

        btn.innerHTML = `
          <span class="day-label">${mobileLabel}</span>
          <span class="day-date">${day.date}</span>
        `;

        if (!hasMovies) {
          btn.disabled = true;
        } else {
          btn.addEventListener("click", () => {
            activeDayIndex = index;
            renderDays();
            renderMovies();
            renderLiveStrip();
          });
        }

        strip.appendChild(btn);
      });

      updateDaysArrows();
    }

    function updateDaysArrows() {
      const strip = document.getElementById("days-strip");
      const prev = document.getElementById("days-prev");
      const next = document.getElementById("days-next");

      if (!strip || !prev || !next) return;

      prev.disabled = strip.scrollLeft <= 0;
      next.disabled = strip.scrollLeft + strip.clientWidth >= strip.scrollWidth - 2;
    }

    function setupDaysNavigation() {
      if (daysNavigationInitialized) return;
      daysNavigationInitialized = true;

      const strip = document.getElementById("days-strip");
      const prev = document.getElementById("days-prev");
      const next = document.getElementById("days-next");

      if (!strip || !prev || !next) return;

      prev.addEventListener("click", () => {
        strip.scrollBy({ left: -320, behavior: "smooth" });
      });

      next.addEventListener("click", () => {
        strip.scrollBy({ left: 320, behavior: "smooth" });
      });

      strip.addEventListener("scroll", updateDaysArrows);

      window.addEventListener("resize", () => {
        renderDays();
        updateDaysArrows();
      });

      updateDaysArrows();
    }

    function parseTimeToDate(isoDate, timeString) {
      return new Date(`${isoDate}T${timeString}:00`);
    }

    function isUpcomingScheduledTime(isoDate, timeItem) {
      if (timeItem.status !== "scheduled") return false;
      const screeningTime = parseTimeToDate(isoDate, timeItem.scheduled_time || timeItem.time);
      return screeningTime > getServerNow();
    }

    function getStatusLabel(status) {
      const map = {
        scheduled: "Планирана",
        ads_started: "Реклами",
        screening_started: "В прожекция",
        finished: "Приключила",
        cancelled: "Отпаднала"
      };
      return map[status] || status;
    }

    function getLiveEntriesToday() {
      const visibleDays = getVisibleDays();
      const todayDay = visibleDays.find(day => isTodayISO(day.iso_date));
      if (!todayDay) return [];

      const entries = [];

      (todayDay.movies || []).forEach((movie, movieIndex) => {
        (movie.times || []).forEach((timeItem) => {
          if (timeItem.status === "ads_started" || timeItem.status === "screening_started") {
            entries.push({
              movieIndex,
              title: movie.title,
              time: timeItem.scheduled_time || timeItem.time,
              hall: timeItem.hall || "",
              status: timeItem.status
            });
          }
        });
      });

      return entries.sort((a, b) => a.time.localeCompare(b.time));
    }

    function renderLiveNavButton() {
      const btn = document.getElementById("live-nav-btn");
      if (!btn) return;

      const liveEntries = getLiveEntriesToday();

      if (liveEntries.length > 0) {
        const adsCount = liveEntries.filter(x => x.status === "ads_started").length;
        const screeningCount = liveEntries.filter(x => x.status === "screening_started").length;

        btn.style.display = "inline-flex";

        if (adsCount > 0 && screeningCount === 0) {
          btn.textContent = `LIVE РЕКЛАМИ ${adsCount}`;
        } else if (screeningCount > 0 && adsCount === 0) {
          btn.textContent = `LIVE ${screeningCount}`;
        } else {
          btn.textContent = `LIVE ${liveEntries.length}`;
        }
      } else {
        btn.style.display = "none";
      }
    }

    function renderLiveStrip() {
      const strip = document.getElementById("live-strip");
      const list = document.getElementById("live-strip-list");
      if (!strip || !list) return;

      const liveEntries = getLiveEntriesToday();

      if (!liveEntries.length) {
        strip.classList.add("hidden");
        list.innerHTML = "";
        return;
      }

      strip.classList.remove("hidden");
      list.innerHTML = "";

      liveEntries.forEach(entry => {
        const item = document.createElement("button");
        item.type = "button";
        item.className = "live-strip-item";
        item.innerHTML = `
          <div class="live-strip-item-top">
            <span class="live-strip-badge ${entry.status === 'ads_started' ? 'ads' : 'movie'}">
              ${entry.status === 'ads_started' ? 'Реклами' : 'В прожекция'}
            </span>
            <span class="live-strip-time">${entry.time}</span>
          </div>

          <div class="live-strip-movie">${entry.title}</div>
          <div class="live-strip-hall">${entry.hall || 'Зала 1'}</div>
        `;
        item.addEventListener("click", () => scrollToLiveCard(entry.movieIndex));
        list.appendChild(item);
      });
    }

    function setupLiveNavClick() {
      const btn = document.getElementById("live-nav-btn");
      if (!btn || btn.dataset.bound === "1") return;

      btn.dataset.bound = "1";

      btn.addEventListener("click", (e) => {
        e.preventDefault();

        const menuToggle = document.getElementById("menu-toggle");
        if (menuToggle) {
          menuToggle.checked = false;
        }

        const strip = document.getElementById("live-strip");
        if (strip && !strip.classList.contains("hidden")) {
          strip.scrollIntoView({ behavior: "smooth", block: "start" });
          return;
        }

        const firstLiveCard = document.querySelector(".card-live");
        if (firstLiveCard) {
          firstLiveCard.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      });
    }

    function scrollToLiveCard(movieIndex) {
      const target = document.querySelector(`[data-movie-index="${movieIndex}"]`);
      if (target) {
        target.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    function renderMovies() {
      const container = document.getElementById("movies-container");
      const visibleDays = getVisibleDays();
      const day = visibleDays[activeDayIndex];

      container.innerHTML = "";

      if (!day) {
        container.innerHTML = '<p style="color:#fde68a;font-weight:700;">Няма налична програма за показване.</p>';
        return;
      }

      const now = getServerNow();
      const isTodaySelected = isTodayISO(day.iso_date);

      let preparedMovies = (day.movies || [])
        .map((movie, index) => {
          const activeLiveItems = (movie.times || []).filter(
            item => item.status === "ads_started" || item.status === "screening_started"
          );

          const activeLiveItem = activeLiveItems[0] || null;

          const visibleTimes = (movie.times || [])
            .filter(item => item.status !== "finished" && item.status !== "cancelled")
            .filter(item => {
              if (item.status === "scheduled") {
                return isUpcomingScheduledTime(day.iso_date, item);
              }
              return true;
            })
            .sort((a, b) => {
              const ta = a.scheduled_time || a.time;
              const tb = b.scheduled_time || b.time;
              return ta.localeCompare(tb);
            });

          const upcomingTimes = (movie.times || [])
            .filter(item => item.status === "scheduled")
            .map(item => ({
              ...item,
              dateObj: parseTimeToDate(day.iso_date, item.scheduled_time || item.time)
            }))
            .filter(item => item.dateObj > now)
            .sort((a, b) => a.dateObj - b.dateObj);

          let sortTime = null;
          let nextCountdown = null;

          if (activeLiveItem) {
            sortTime = new Date(now.getTime() - 60 * 1000);
          } else if (upcomingTimes.length > 0) {
            sortTime = upcomingTimes[0].dateObj;

            const diffMs = upcomingTimes[0].dateObj - now;
            const totalSeconds = Math.max(0, Math.floor(diffMs / 1000));
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            let text = "";
            if (hours > 0) {
              text = `${hours}ч ${minutes}м ${seconds}с`;
            } else if (minutes > 0) {
              text = `${minutes}м ${seconds}с`;
            } else {
              text = `${seconds}с`;
            }

            nextCountdown = {
              time: upcomingTimes[0].scheduled_time || upcomingTimes[0].time,
              hall: upcomingTimes[0].hall,
              type: upcomingTimes[0].type,
              text,
              dateObj: upcomingTimes[0].dateObj
            };
          }

          if (visibleTimes.length === 0 && !activeLiveItem && !nextCountdown) {
            return null;
          }

          return {
            ...movie,
            _id: index,
            visibleTimes,
            activeLiveItem,
            activeLiveItems,
            sortTime,
            nextCountdown,
            showNextCountdown: false
          };
        })
        .filter(Boolean)
        .sort((a, b) => {
          if (!a.sortTime && !b.sortTime) return 0;
          if (!a.sortTime) return 1;
          if (!b.sortTime) return -1;
          return a.sortTime - b.sortTime;
        });

      if (preparedMovies.length === 0) {
        container.innerHTML = '<p style="color:#fde68a;font-weight:700;">Все още няма налични прожекции за този ден.</p>';
        return;
      }

      if (isTodaySelected) {
        const liveMovieIndex = preparedMovies.findIndex(movie => movie.activeLiveItem);
        if (liveMovieIndex !== -1) {
          preparedMovies[liveMovieIndex].showNextCountdown = true;
        } else {
          const nextMovieIndex = preparedMovies.findIndex(movie => movie.nextCountdown);
          if (nextMovieIndex !== -1) {
            preparedMovies[nextMovieIndex].showNextCountdown = true;
          }
        }
      }

      preparedMovies.forEach(movie => {
        const card = document.createElement("article");
        card.className = "card" + (movie.activeLiveItem ? " card-live" : "");
        card.setAttribute("data-movie-index", movie._id);

        const timesHtml = movie.visibleTimes.length
          ? movie.visibleTimes.map(item => {
              const statusText = item.status && item.status !== "scheduled"
                ? `<small class="hall-label">${getStatusLabel(item.status)}</small>`
                : `<small class="hall-label">${item.hall || ""}</small>`;

              let extraClass = "";
              if (item.status === "cancelled") extraClass = " cancelled-time";
              if (item.status === "ads_started" || item.status === "screening_started") extraClass = " live-time";

              return `
                <span class="time ${item.type === "vip" ? "vip-time" : "standard-time"}${extraClass}">
                  <span class="time-value">${item.scheduled_time || item.time}</span>
                  ${statusText}
                </span>
              `;
            }).join("")
          : '<span class="time standard-time" style="opacity:.6;">Няма активни часове за показване</span>';

        let progressHtml = "";
        if (movie.activeLiveItem) {
          const phaseLabel = movie.activeLiveItem.status === "ads_started"
            ? "Реклами"
            : "В прожекция";

          const phaseClass = movie.activeLiveItem.status === "ads_started"
            ? "ads-phase"
            : "";

          progressHtml = `
            <div class="screening-progress ${phaseClass}">
              <div class="screening-progress-header">
                <span class="live-badge pulse">${phaseLabel}</span>
                <span class="remaining-time">
                  ${movie.activeLiveItem.scheduled_time || movie.activeLiveItem.time} • ${movie.activeLiveItem.hall || "Зала 1"}
                </span>
              </div>
              <div class="progress-bar">
                <div class="progress-bar-fill" style="width:100%"></div>
              </div>
            </div>
          `;
        }

        const countdownHtml = movie.showNextCountdown && movie.nextCountdown
          ? `
            <div class="next-countdown">
              <div class="next-countdown-header">
                <span class="next-badge">
                  ${movie.activeLiveItem ? "Следваща прожекция на този филм" : "Следващ филм"}
                </span>
                <span class="next-time">
                  ${movie.nextCountdown.time}${movie.nextCountdown.hall ? ` • ${movie.nextCountdown.hall}` : ""}
                </span>
              </div>
              <div class="next-countdown-text">Започва след ${movie.nextCountdown.text}</div>
            </div>
          `
          : "";

        const hasDubbed = String(movie.version || "").toLowerCase().includes("дублиран");
        const speakerIcon = hasDubbed
          ? ` <img src="speaker.png" alt="Дублиран" class="dubbed-icon">`
          : "";

        const versionFormatted = String(movie.version || "")
          .replace(/3D/g, '<span class="tag-3d">3D</span>');

        const safeTrailer = String(movie.trailer || "").replace(/'/g, "\\'");

        card.innerHTML = `
          <img class="poster" src="${movie.poster}" alt="${movie.title}">
          <div class="card-body">
            <h3>${movie.title}</h3>

            <div class="meta">
              <div><strong>Жанр:</strong> ${movie.genre || "Няма информация"}</div>
              <div><strong>Продължителност:</strong> ${movie.duration || "Няма информация"}</div>
              <div class="version-row"><strong>Версия:</strong> ${versionFormatted || "Няма информация"}${speakerIcon}</div>
            </div>

            <div class="actions">
              <button class="trailer-btn" onclick="openTrailer('${safeTrailer}')">
                ▶ Трейлър
              </button>
            </div>

            <div class="times">
              <div class="schedule-group">
                <div class="schedule-hours">
                  ${timesHtml}
                </div>
              </div>
            </div>

            ${progressHtml}
            ${countdownHtml}

            <span class="badge">Категория: ${movie.category || "Няма информация"}</span>
          </div>
        `;

        container.appendChild(card);
      });

      renderLiveNavButton();
      renderLiveStrip();
    }

    function openTrailer(url) {
      if (!url) return;

      const modal = document.getElementById("trailerModal");
      const frame = document.getElementById("trailerFrame");
      const separator = url.includes("?") ? "&" : "?";

      frame.src = url + separator + "autoplay=1";
      modal.classList.add("active");
    }

    function closeTrailer() {
      const modal = document.getElementById("trailerModal");
      const frame = document.getElementById("trailerFrame");

      frame.src = "";
      modal.classList.remove("active");
    }

    function outsideClose(event) {
      const content = document.querySelector(".modal-content");
      if (content && !content.contains(event.target)) {
        closeTrailer();
      }
    }

    function refreshUI() {
      if (!scheduleData) return;

      const now = getServerNow();

      if (now.getDate() !== lastDate) {
        lastDate = now.getDate();
        loadSchedule();
        return;
      }

      renderMovies();
      renderLiveNavButton();
      renderLiveStrip();
    }

    // Само UI refresh за countdown / live визуализация
    setInterval(() => {
      refreshUI();
    }, 1000);

    // Проверка за промяна от backend на 30 сек
    setInterval(() => {
      checkVersion();
    }, 30000);

    // Нормален reload на данните на 10 минути
    setInterval(() => {
      loadSchedule();
    }, 600000);

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) {
        loadSchedule();
      }
    });

    window.addEventListener("focus", () => {
      loadSchedule();
    });
  </script>
</body>
</html>
