<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Кино Програма</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="container topbar">
      <a href="index.html" class="logo">
        <img src="Blue White Business ID Card.png" alt="Palace Кино" />
      </a>

      <div class="topbar-right">
        <div class="live-nav" id="live-nav" style="display:none;">
          <button class="live-nav-btn pulse" id="live-nav-btn" type="button">
            LIVE
          </button>
          <div class="live-nav-dropdown" id="live-nav-dropdown"></div>
        </div>

        <div class="nav-wrap">
          <input type="checkbox" id="menu-toggle" class="menu-checkbox" />
          <label for="menu-toggle" class="menu-toggle" aria-label="Отвори меню">☰</label>

          <nav>
            <a href="index.html">Програма</a>
            <a href="premieres.html">Премиери в България</a>
          </nav>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1 id="week-title">Програма</h1>
    </section>

    <div class="days-nav">
      <button class="days-arrow" id="days-prev" aria-label="Предишни дни">‹</button>
      <section class="days-strip" id="days-strip"></section>
      <button class="days-arrow" id="days-next" aria-label="Следващи дни">›</button>
    </div>

    <section class="grid" id="movies-container">Зареждане...</section>
  </main>

  <footer>
    <div class="container">
      Официалният сайт на кино Palace:
      <a href="https://kinopalace.bg/" target="_blank" rel="noopener noreferrer">НАЧАЛО</a>
    </div>
  </footer>

  <div id="trailerModal" class="modal" onclick="outsideClose(event)">
    <div class="modal-content">
      <button class="close" onclick="closeTrailer()" aria-label="Затвори трейлъра">×</button>
      <iframe
        id="trailerFrame"
        src=""
        title="Трейлър"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <script>
    let scheduleData = null;
    let activeDayIndex = 0;
    let lastDate = new Date().getDate();
    const ADS_MINUTES = 10;

    fetch('schedule.json')
      .then(response => {
        if (!response.ok) {
          throw new Error('Не може да се зареди schedule.json');
        }
        return response.json();
      })
      .then(data => {
        try {
          scheduleData = normalizeScheduleData(data);

          if (!scheduleData || !Array.isArray(scheduleData.days)) {
            throw new Error('Невалидна структура на schedule.json');
          }

          document.getElementById('week-title').textContent = scheduleData.weekTitle || 'Програма';
          setTodayAsActive();
          renderDays();
          renderMovies();
          renderLiveNav();
          setupDaysNavigation();
          setupLiveNav();
        } catch (error) {
          throw error;
        }
      })
      .catch(error => {
        console.error('Schedule load/render error:', error);
        showMaintenanceMessage();
      });

    function showMaintenanceMessage() {
      document.getElementById('week-title').textContent = 'Временна недостъпност';
      document.getElementById('days-strip').innerHTML = '';
      document.getElementById('movies-container').innerHTML = `
        <div class="maintenance-box">
          <div class="maintenance-icon">⚙</div>
          <h2>В момента се прави подобрение по страницата</h2>
          <p>Надяваме се възможно най-скоро да възстановим достъпа до нея.</p>
        </div>
      `;
    }

    function normalizeScheduleData(data) {
      return {
        ...data,
        days: (data.days || []).map(day => ({
          ...day,
          movies: (day.movies || []).map(movie => ({
            ...movie,
            times: normalizeMovieTimes(movie.times)
          }))
        }))
      };
    }

    function normalizeMovieTimes(times) {
      if (!Array.isArray(times)) return [];

      return times.map(item => {
        if (typeof item === 'string') {
          return {
            time: item,
            hall: 'Зала 1',
            type: 'standard'
          };
        }

        return {
          time: item.time || '',
          hall: item.hall || 'Зала 1',
          type: item.type || (
            String(item.hall || '').toLowerCase().includes('vip') ? 'vip' : 'standard'
          )
        };
      }).filter(item => item.time);
    }

    function parseDayDate(dayDate) {
      const [day, month] = dayDate.split('.');
      const year = new Date().getFullYear();
      return new Date(year, Number(month) - 1, Number(day));
    }

    function isFutureOrToday(dayDate) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const dateObj = parseDayDate(dayDate);
      dateObj.setHours(0, 0, 0, 0);

      return dateObj >= today;
    }

    function isTodayDay(dayDate) {
      const today = new Date();
      const todayStr =
        String(today.getDate()).padStart(2, '0') + '.' +
        String(today.getMonth() + 1).padStart(2, '0');

      return dayDate === todayStr;
    }

    function getVisibleDays() {
      return (scheduleData.days || []).filter(day => isFutureOrToday(day.date));
    }

    function setTodayAsActive() {
      const today = new Date();
      const todayStr =
        String(today.getDate()).padStart(2, '0') + '.' +
        String(today.getMonth() + 1).padStart(2, '0');

      const visibleDays = getVisibleDays();
      const todayIndex = visibleDays.findIndex(day => day.date === todayStr);

      if (todayIndex !== -1) {
        activeDayIndex = todayIndex;
        return;
      }

      const firstDayWithMovies = visibleDays.findIndex(day => day.movies && day.movies.length > 0);
      activeDayIndex = firstDayWithMovies !== -1 ? firstDayWithMovies : 0;
    }

    function renderDays() {
      const strip = document.getElementById('days-strip');
      const visibleDays = getVisibleDays();

      strip.innerHTML = '';

      const shortDays = {
        'Понеделник': 'Пон',
        'Вторник': 'Вт',
        'Сряда': 'Ср',
        'Четвъртък': 'Чет',
        'Петък': 'Пет',
        'Събота': 'Съб',
        'Неделя': 'Нед'
      };

      visibleDays.forEach((day, index) => {
        const hasMovies = day.movies && day.movies.length > 0;
        const mobileLabel = window.innerWidth <= 760
          ? (shortDays[day.label] || day.label)
          : day.label;

        const btn = document.createElement('button');
        btn.className =
          'day-tab' +
          (index === activeDayIndex ? ' active' : '') +
          (!hasMovies ? ' empty-day' : '');

        btn.innerHTML = `
          <span class="day-label">${mobileLabel}</span>
          <span class="day-date">${day.date}</span>
        `;

        if (!hasMovies) {
          btn.disabled = true;
        } else {
          btn.addEventListener('click', () => {
            activeDayIndex = index;
            renderDays();
            renderMovies();
          });
        }

        strip.appendChild(btn);
      });

      updateDaysArrows();
    }

    function updateDaysArrows() {
      const strip = document.getElementById('days-strip');
      const prev = document.getElementById('days-prev');
      const next = document.getElementById('days-next');

      if (!strip || !prev || !next) return;

      prev.disabled = strip.scrollLeft <= 0;
      next.disabled = strip.scrollLeft + strip.clientWidth >= strip.scrollWidth - 2;
    }

    function setupDaysNavigation() {
      const strip = document.getElementById('days-strip');
      const prev = document.getElementById('days-prev');
      const next = document.getElementById('days-next');

      if (!strip || !prev || !next) return;

      prev.addEventListener('click', () => {
        strip.scrollBy({ left: -320, behavior: 'smooth' });
      });

      next.addEventListener('click', () => {
        strip.scrollBy({ left: 320, behavior: 'smooth' });
      });

      strip.addEventListener('scroll', updateDaysArrows);
      window.addEventListener('resize', () => {
        renderDays();
        updateDaysArrows();
      });

      updateDaysArrows();
    }

    function parseTimeToDate(dayDate, timeString) {
      const [day, month] = dayDate.split('.');
      const [hours, minutes] = String(timeString).split(':');
      const year = new Date().getFullYear();

      return new Date(
        year,
        Number(month) - 1,
        Number(day),
        Number(hours),
        Number(minutes),
        0,
        0
      );
    }

    function parseDurationMinutes(durationText) {
      const match = String(durationText || '').match(/\d+/);
      return match ? Number(match[0]) : 0;
    }

    function isTimeStillVisible(dayDate, timeString) {
      const screeningTime = parseTimeToDate(dayDate, timeString);
      const now = new Date();
      return now < screeningTime;
    }

    function getScreeningProgress(dayDate, timeString, durationText) {
      const startTime = parseTimeToDate(dayDate, timeString);
      const filmMinutes = parseDurationMinutes(durationText);
      const totalMinutes = ADS_MINUTES + filmMinutes;

      const adsEndTime = new Date(startTime.getTime() + ADS_MINUTES * 60 * 1000);
      const endTime = new Date(startTime.getTime() + totalMinutes * 60 * 1000);

      const now = new Date();
      const total = endTime - startTime;
      const elapsed = now - startTime;
      const remaining = endTime - now;

      if (now < startTime || now > endTime || total <= 0) {
        return null;
      }

      const percent = Math.min(100, Math.max(0, (elapsed / total) * 100));
      const remainingMinutes = Math.max(0, Math.ceil(remaining / 60000));

      let phase = 'movie';
      let phaseLabel = 'В прожекция';

      if (now < adsEndTime) {
        phase = 'ads';
        phaseLabel = 'Реклами';
      }

      return {
        percent,
        remainingMinutes,
        phase,
        phaseLabel
      };
    }

    function getTodayLiveScreenings() {
      if (!scheduleData || !Array.isArray(scheduleData.days)) return [];

      const today = new Date();
      const todayStr =
        String(today.getDate()).padStart(2, '0') + '.' +
        String(today.getMonth() + 1).padStart(2, '0');

      const todayDay = scheduleData.days.find(day => day.date === todayStr);
      if (!todayDay || !Array.isArray(todayDay.movies)) return [];

      const liveItems = [];

      todayDay.movies.forEach(movie => {
        (movie.times || []).forEach(item => {
          const progress = getScreeningProgress(todayDay.date, item.time, movie.duration);

          if (progress) {
            liveItems.push({
              title: movie.title,
              time: item.time,
              hall: item.hall || 'Зала 1',
              type: item.type || 'standard',
              phase: progress.phase,
              phaseLabel: progress.phaseLabel,
              remainingMinutes: progress.remainingMinutes
            });
          }
        });
      });

      liveItems.sort((a, b) => a.time.localeCompare(b.time, 'bg'));
      return liveItems;
    }

    function renderLiveNav() {
      const liveNav = document.getElementById('live-nav');
      const dropdown = document.getElementById('live-nav-dropdown');

      if (!liveNav || !dropdown) return;

      const liveItems = getTodayLiveScreenings();

      if (!liveItems.length) {
        liveNav.style.display = 'none';
        liveNav.classList.remove('open');
        dropdown.innerHTML = '';
        return;
      }

      liveNav.style.display = 'flex';

      dropdown.innerHTML = liveItems.map(item => `
        <div class="live-live-item">
          <div class="live-live-top">
            <span class="live-live-time">${item.time}</span>
            <span class="live-live-phase ${item.phase === 'ads' ? 'ads' : 'movie'}">
              ${item.phaseLabel}
            </span>
          </div>
          <div class="live-live-title">${item.title}</div>
          <div class="live-live-hall">${item.hall} • остават ${item.remainingMinutes} мин</div>
        </div>
      `).join('');
    }

    function setupLiveNav() {
      const liveNav = document.getElementById('live-nav');
      const liveBtn = document.getElementById('live-nav-btn');

      if (!liveNav || !liveBtn) return;

      liveBtn.addEventListener('click', (event) => {
        event.stopPropagation();
        liveNav.classList.toggle('open');
      });

      document.addEventListener('click', (event) => {
        if (!liveNav.contains(event.target)) {
          liveNav.classList.remove('open');
        }
      });
    }

    function renderMovies() {
      const container = document.getElementById('movies-container');
      const visibleDays = getVisibleDays();
      const day = visibleDays[activeDayIndex];

      container.innerHTML = '';

      if (!day) {
        container.innerHTML = '<p style="color:#fde68a;font-weight:700;">Няма налична програма за показване.</p>';
        return;
      }

      const now = new Date();
      const isTodaySelected = isTodayDay(day.date);

      let preparedMovies = (day.movies || [])
        .map((movie, index) => {
          const visibleTimes = movie.times
            .filter(item => isTimeStillVisible(day.date, item.time))
            .sort((a, b) => parseTimeToDate(day.date, a.time) - parseTimeToDate(day.date, b.time));

          const activeProgress = movie.times
            .map(item => ({
              ...item,
              progress: getScreeningProgress(day.date, item.time, movie.duration)
            }))
            .find(item => item.progress !== null);

          const upcomingTimes = movie.times
            .map(item => ({
              ...item,
              dateObj: parseTimeToDate(day.date, item.time)
            }))
            .filter(item => item.dateObj > now)
            .sort((a, b) => a.dateObj - b.dateObj);

          let sortTime = null;
          let nextCountdown = null;

          if (upcomingTimes.length > 0) {
            sortTime = upcomingTimes[0].dateObj;

            const diffMs = upcomingTimes[0].dateObj - now;
            const totalSeconds = Math.max(0, Math.floor(diffMs / 1000));
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            let text = '';
            if (hours > 0) {
              text = `${hours}ч ${minutes}м ${seconds}с`;
            } else if (minutes > 0) {
              text = `${minutes}м ${seconds}с`;
            } else {
              text = `${seconds}с`;
            }

            nextCountdown = {
              time: upcomingTimes[0].time,
              hall: upcomingTimes[0].hall,
              type: upcomingTimes[0].type,
              text,
              dateObj: upcomingTimes[0].dateObj
            };
          } else if (activeProgress) {
            sortTime = new Date(now.getTime() + 365 * 24 * 60 * 60 * 1000);
          }

          if (visibleTimes.length === 0 && !activeProgress) {
            return null;
          }

          return {
            ...movie,
            _id: index,
            visibleTimes,
            activeProgress,
            sortTime,
            nextCountdown,
            showNextCountdown: false
          };
        })
        .filter(Boolean)
        .sort((a, b) => {
          if (!a.sortTime && !b.sortTime) return 0;
          if (!a.sortTime) return 1;
          if (!b.sortTime) return -1;
          return a.sortTime - b.sortTime;
        });

      if (preparedMovies.length === 0) {
        container.innerHTML = '<p style="color:#fde68a;font-weight:700;">Все още няма налични прожекции за този ден.</p>';
        return;
      }

      if (isTodaySelected) {
        const liveMovieIndex = preparedMovies.findIndex(
          movie => movie.activeProgress && movie.nextCountdown
        );

        if (liveMovieIndex !== -1) {
          preparedMovies[liveMovieIndex].showNextCountdown = true;
        } else {
          const nextMovieIndex = preparedMovies.findIndex(
            movie => movie.nextCountdown
          );

          if (nextMovieIndex !== -1) {
            preparedMovies[nextMovieIndex].showNextCountdown = true;
          }
        }
      }

      preparedMovies.forEach(movie => {
        const card = document.createElement('article');
        card.className = 'card';

        const timesHtml = movie.visibleTimes.length
          ? movie.visibleTimes.map(item => `
              <span class="time ${item.type === 'vip' ? 'vip-time' : 'standard-time'}">
                <span class="time-value">${item.time}</span>
                <small class="hall-label">${item.hall || ''}</small>
              </span>
            `).join('')
          : '<span class="time standard-time" style="opacity:.6;">Прожекцията вече тече</span>';

        const countdownHtml = movie.showNextCountdown && movie.nextCountdown
          ? `
            <div class="next-countdown">
              <div class="next-countdown-header">
                <span class="next-badge">
                  ${movie.activeProgress ? 'Следваща прожекция на този филм' : 'Следващ филм'}
                </span>
                <span class="next-time">
                  ${movie.nextCountdown.time}${movie.nextCountdown.hall ? ` • ${movie.nextCountdown.hall}` : ''}
                </span>
              </div>
              <div class="next-countdown-text">Започва след ${movie.nextCountdown.text}</div>
            </div>
          `
          : '';

        const versionText = String(movie.version || '');
        const has3D = versionText.includes('3D');
        const isDubbed = versionText.toLowerCase().includes('дублиран');

        const cleanVersionText = versionText
          .replace('3D / ', '')
          .replace('3D', '')
          .trim();

        const versionFormatted = `
          <span class="version-inline">
            ${has3D ? '<span class="tag-3d">3D</span>' : ''}
            <span>${cleanVersionText}</span>
            ${isDubbed ? '<img src="speaker.png" alt="Дублиран" class="dub-icon">' : ''}
          </span>
        `;

        card.innerHTML = `
          <img class="poster" src="${movie.poster}" alt="${movie.title}">
          <div class="card-body">
            <h3>${movie.title}</h3>

            <div class="meta">
              <div><strong>Жанр:</strong> ${movie.genre}</div>
              <div><strong>Продължителност:</strong> ${movie.duration}</div>
              <div><strong>Версия:</strong> ${versionFormatted}</div>
            </div>

            <div class="actions">
              <button class="trailer-btn" onclick="openTrailer('${movie.trailer}')">
                ▶ Трейлър
              </button>
            </div>

            <div class="times">
              <div class="schedule-group">
                <div class="schedule-hours">
                  ${timesHtml}
                </div>
              </div>
            </div>

            ${countdownHtml}

            <span class="badge">Категория: ${movie.category}</span>
          </div>
        `;

        container.appendChild(card);
      });
    }

    function openTrailer(url) {
      const modal = document.getElementById('trailerModal');
      const frame = document.getElementById('trailerFrame');
      frame.src = url + '?autoplay=1';
      modal.classList.add('active');
    }

    function closeTrailer() {
      const modal = document.getElementById('trailerModal');
      const frame = document.getElementById('trailerFrame');
      frame.src = '';
      modal.classList.remove('active');
    }

    function outsideClose(event) {
      const content = document.querySelector('.modal-content');
      if (!content.contains(event.target)) {
        closeTrailer();
      }
    }

    function refreshUI() {
      if (!scheduleData) return;

      const now = new Date();

      if (now.getDate() !== lastDate) {
        lastDate = now.getDate();
        setTodayAsActive();
        renderDays();
      }

      renderMovies();
      renderLiveNav();
    }

    setInterval(() => {
      refreshUI();
    }, 1000);

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        refreshUI();
      }
    });

    window.addEventListener('focus', () => {
      refreshUI();
    });
  </script>
</body>
</html>
